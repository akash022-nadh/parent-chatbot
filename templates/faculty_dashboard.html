<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Dashboard — EduParent</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f1b35;
    --navy-mid: #1a2d54;
    --teal: #00c9a7;
    --teal-dark: #00a889;
    --gold: #f5c842;
    --light: #e8f0fe;
    --text: #e2e8f4;
    --muted: #8a9bb8;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --error: #ff6b6b;
    --success: #00c9a7;
    --bg-color: var(--navy);
  }

  [data-theme="light"] {
    --navy: #ffffff;
    --navy-mid: #f5f5f5;
    --teal: #000000;
    --teal-dark: #333333;
    --gold: #000000;
    --light: #000000;
    --text: #000000;
    --muted: #666666;
    --card-bg: rgba(0,0,0,0.03);
    --card-border: rgba(0,0,0,0.15);
    --bg-color: #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-color);
    color: var(--text);
    min-height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 30px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--text);
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .user-badge {
    background: rgba(0,201,167,0.1);
    border: 1px solid rgba(0,201,167,0.3);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    color: var(--teal);
  }

  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--teal), var(--teal-dark));
    color: #fff;
  }

  .btn-primary:hover { transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--muted);
  }

  .btn-ghost:hover { border-color: var(--teal); color: var(--teal); }

  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
  }

  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    margin-bottom: 16px;
    color: var(--text);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--card-border);
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-label { color: var(--muted); font-size: 0.9rem; }

  .stat-value {
    font-weight: 600;
    color: var(--text);
  }

  .stat-value.good { color: var(--success); }
  .stat-value.warning { color: var(--gold); }
  .stat-value.bad { color: var(--error); }

  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 30px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 100;
    font-size: 0.85rem;
    color: var(--text);
  }

  .theme-toggle select {
    background: var(--card-bg);
    border: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
    padding: 4px 8px;
    border-radius: 8px;
  }

  .quick-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .action-btn {
    padding: 10px 16px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover {
    border-color: var(--teal);
    background: rgba(0,201,167,0.1);
  }

  .student-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .student-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    border-bottom: 1px solid var(--card-border);
    transition: background 0.2s;
  }

  .student-item:hover {
    background: rgba(0,201,167,0.05);
  }

  .student-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .student-name { font-weight: 500; }

  .student-reg { font-size: 0.8rem; color: var(--muted); }

  @media (max-width: 768px) {
    .header { flex-direction: column; gap: 15px; }
    .dashboard-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="theme-toggle">
  🎨 <select id="themeSelect" onchange="setTheme(this.value)">
    <option value="dark">Dark Mode</option>
    <option value="light">Light Mode</option>
  </select>
</div>

<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">👨‍🏫</div>
      <div>
        <h1>EduParent</h1>
        <p style="color: var(--muted); font-size: 0.85rem;">Faculty Portal</p>
      </div>
    </div>
    <div class="user-info">
      <span class="user-badge">👨‍🏫 Faculty</span>
      <button class="btn btn-ghost" onclick="window.location.href='/'">Logout</button>
    </div>
  </div>

  <div class="dashboard-grid">
    <!-- Profile Card -->
    <div class="card">
      <h2>👤 Profile</h2>
      <div class="stat-row">
        <span class="stat-label">Name</span>
        <span class="stat-value" id="facultyName">Loading...</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Employee ID</span>
        <span class="stat-value" id="empId">-</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Department</span>
        <span class="stat-value" id="department">-</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Designation</span>
        <span class="stat-value" id="designation">-</span>
      </div>
    </div>

    <!-- Stats Card -->
    <div class="card">
      <h2>📊 Statistics</h2>
      <div class="stat-row">
        <span class="stat-label">Students Assigned</span>
        <span class="stat-value" id="studentCount">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Subjects Handling</span>
        <span class="stat-value" id="subjectCount">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Classes Today</span>
        <span class="stat-value" id="classCount">0</span>
      </div>
    </div>

    <!-- Quick Actions Card -->
    <div class="card">
      <h2>⚡ Quick Actions</h2>
      <div class="quick-actions">
        <button class="action-btn" onclick="window.location.href='/chat'">💬 Chat with Bot</button>
        <button class="action-btn" onclick="showStudents()">👨‍🎓 My Students</button>
        <button class="action-btn" onclick="markAttendance()">📋 Mark Attendance</button>
        <button class="action-btn" onclick="enterMarks()">📝 Enter Marks</button>
      </div>
    </div>
  </div>

  <!-- Students List -->
  <div class="card">
    <h2>👨‍🎓 Assigned Students</h2>
    <div class="student-list" id="studentList">
      <div class="student-item">
        <div class="student-info">
          <span class="student-name">Loading students...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function setTheme(theme) {
    if (theme === 'dark') {
      document.documentElement.removeAttribute('data-theme');
    } else {
      document.documentElement.setAttribute('data-theme', theme);
    }
    localStorage.setItem('theme', theme);
  }

  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.getElementById('themeSelect').value = savedTheme;
  setTheme(savedTheme);

  function showStudents() {
    alert('Opening student list...\n\nThis feature will be available soon!');
  }

  function markAttendance() {
    alert('Opening attendance form...\n\nThis feature will be available soon!');
  }

  function enterMarks() {
    alert('Opening marks entry...\n\nThis feature will be available soon!');
  }

  // Load user data from token
  async function loadProfile() {
    const token = localStorage.getItem('access_token');
    if (!token) {
      window.location.href = '/faculty/login';
      return;
    }

    try {
      const res = await fetch('/api/faculty/profile', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      
      if (data.success) {
        document.getElementById('facultyName').textContent = data.profile.name || 'Faculty';
        document.getElementById('empId').textContent = data.profile.employee_id || '-';
        document.getElementById('department').textContent = data.profile.department || '-';
        document.getElementById('designation').textContent = data.profile.designation || '-';
        document.getElementById('studentCount').textContent = data.profile.students_count || 0;
        document.getElementById('subjectCount').textContent = data.profile.subjects?.length || 0;
        
        // Load students
        if (data.students && data.students.length > 0) {
          const list = document.getElementById('studentList');
          list.innerHTML = data.students.map(s => `
            <div class="student-item">
              <div class="student-info">
                <span class="student-name">${s.name}</span>
                <span class="student-reg">${s.reg_no} • ${s.branch}</span>
              </div>
              <span class="stat-value">${s.attendance || '-'}%</span>
            </div>
          `).join('');
        }
      }
    } catch (err) {
      console.error('Error loading profile:', err);
    }
  }

  loadProfile();
</script>
</body>
</html>
